<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de clientes</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f5f7fb;
        color: #1f2937;
      }
      .container {
        max-width: 1100px;
        margin: 40px auto;
        background: white;
        padding: 24px;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }
      .header h1 { margin: 0; font-size: 24px; }
      .btn {
        background: #2563eb;
        color: white;
        border: none;
        padding: 10px 16px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
      }
      .btn:hover { background: #1d4ed8; }
      .search-box { margin-bottom: 16px; }
      .search-box input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 14px;
      }
      table { width: 100%; border-collapse: collapse; }
      th, td { padding: 12px; border-bottom: 1px solid #e5e7eb; text-align: left; }
      th { background: #f8fafc; }
      .badge {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
      }
      .active { background: #dcfce7; color: #166534; }
      .inactive { background: #fee2e2; color: #991b1b; }
      .actions button { border: none; background: transparent; cursor: pointer; color: #2563eb; font-weight: 600; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Gestión de clientes</h1>
        <button class="btn" onclick="registrarCliente()">Registrar Cliente</button>
      </div>

      <div class="search-box">
        <input id="searchInput" type="text" placeholder="Buscar por nombre o correo..." />
      </div>

      <table>
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Correo</th>
            <th>Teléfono</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="clientesTableBody"></tbody>
      </table>
    </div>

    <script>
      const clientes = [
        { id: 1, nombre: 'Ana García', correo: 'ana@correo.com', telefono: '555-1001', estado: 'Activo' },
        { id: 2, nombre: 'Carlos López', correo: 'carlos@correo.com', telefono: '555-1002', estado: 'Inactivo' },
        { id: 3, nombre: 'María Pérez', correo: 'maria@correo.com', telefono: '555-1003', estado: 'Activo' }
      ];

      const tableBody = document.getElementById('clientesTableBody');
      const searchInput = document.getElementById('searchInput');

      function renderClientes(lista) {
        if (!lista.length) {
          tableBody.innerHTML = '<tr><td colspan="5">No se encontraron clientes.</td></tr>';
          return;
        }

        tableBody.innerHTML = lista.map(cliente => `
          <tr>
            <td>${cliente.nombre}</td>
            <td>${cliente.correo}</td>
            <td>${cliente.telefono}</td>
            <td><span class="badge ${cliente.estado === 'Activo' ? 'active' : 'inactive'}">${cliente.estado}</span></td>
            <td class="actions"><button>Ver</button></td>
          </tr>
        `).join('');
      }

      function filtrarClientes() {
        const termino = searchInput.value.toLowerCase();
        const filtrados = clientes.filter(cliente =>
          cliente.nombre.toLowerCase().includes(termino) || cliente.correo.toLowerCase().includes(termino)
        );
        renderClientes(filtrados);
      }

      searchInput.addEventListener('input', filtrarClientes);
      renderClientes(clientes);

      function registrarCliente() {
        alert('Registrar cliente próximamente');
      }
    </script>
  </body>
</html>
